---
openapi: 3.0.1
info:
  title: Launch Tracker API
  version: v1
  description: Global orbital launch data aggregated from Launch Library 2. Built
    with Rails 8.1 API-only.
  contact:
    name: Alessandro Guelpa
    url: https://alessandroguelpa.it
servers:
- url: http://localhost:3000
  description: Development
components:
  schemas:
    launch:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date_utc:
          type: string
          format: date-time
        success:
          type: boolean
          nullable: true
        provider:
          type: string
          nullable: true
        rocket:
          type: string
          nullable: true
        pad:
          type: string
          nullable: true
    rocket:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        active:
          type: boolean
        first_flight:
          type: string
          format: date
          nullable: true
    pagination:
      type: object
      properties:
        current_page:
          type: integer
        total_pages:
          type: integer
        total_count:
          type: integer
paths:
  "/api/v1/launches":
    get:
      summary: List launches
      tags:
      - Launches
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Results per page (default 20)
        schema:
          type: integer
      - name: q
        in: query
        required: false
        description: Search by name or provider
        schema:
          type: string
      - name: provider
        in: query
        required: false
        description: Filter by provider name (partial match)
        schema:
          type: string
      - name: year
        in: query
        required: false
        description: Filter by launch year
        schema:
          type: integer
      - name: success
        in: query
        required: false
        description: Filter by success status
        schema:
          type: boolean
      - name: rocket_id
        in: query
        required: false
        description: Filter by rocket ID
        schema:
          type: integer
      responses:
        '200':
          description: Returns paginated launches
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/launch"
                  meta:
                    "$ref": "#/components/schemas/pagination"
  "/api/v1/launches/{id}":
    get:
      summary: Get a launch
      tags:
      - Launches
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Returns launch details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/launch"
        '404':
          description: Launch not found
  "/api/v1/launches/upcoming":
    get:
      summary: Upcoming launches
      tags:
      - Launches
      parameters:
      - name: limit
        in: query
        required: false
        description: Max results (default 10)
        schema:
          type: integer
      responses:
        '200':
          description: Returns upcoming launches
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/launch"
  "/api/v1/launches/latest":
    get:
      summary: Latest completed launch
      tags:
      - Launches
      responses:
        '200':
          description: Returns the most recent completed launch
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/launch"
  "/api/v1/rockets":
    get:
      summary: List rockets
      tags:
      - Rockets
      parameters:
      - name: active
        in: query
        required: false
        description: Filter active rockets (true/false)
        schema:
          type: string
      responses:
        '200':
          description: Returns rockets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/rocket"
  "/api/v1/rockets/{id}":
    get:
      summary: Get a rocket
      tags:
      - Rockets
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Returns rocket details
        '404':
          description: Rocket not found
  "/api/v1/rockets/{rocket_id}/launches":
    get:
      summary: Launches for a rocket
      tags:
      - Rockets
      parameters:
      - name: rocket_id
        in: path
        required: true
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: Returns launches for the rocket
  "/api/v1/stats/launches_per_year":
    get:
      summary: Launches per year
      tags:
      - Statistics
      responses:
        '200':
          description: Returns launch count grouped by year
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: integer
                    example:
                      '2024': 220
                      '2025': 250
  "/api/v1/stats/success_rate":
    get:
      summary: Success rate
      tags:
      - Statistics
      responses:
        '200':
          description: Returns overall and per-rocket success rates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      overall:
                        type: object
                        properties:
                          total:
                            type: integer
                          successes:
                            type: integer
                          failures:
                            type: integer
                          rate:
                            type: number
                            format: float
                      per_rocket:
                        type: array
                        items:
                          type: object
                          properties:
                            rocket:
                              type: string
                            total:
                              type: integer
                            successes:
                              type: integer
                            rate:
                              type: number
                              format: float
  "/api/v1/stats/streak":
    get:
      summary: Current success streak
      tags:
      - Statistics
      responses:
        '200':
          description: Returns current consecutive success count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      current_success_streak:
                        type: integer
  "/api/v1/stats/providers":
    get:
      summary: Launches by provider
      tags:
      - Statistics
      responses:
        '200':
          description: Returns launch count per provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: integer
